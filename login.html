<!DOCTYPE html>
<html>
<body>
  <h2>Login</h2>
  <input id="email" placeholder="Email" /><br><br>
  <input id="password" type="password" placeholder="Password" /><br><br>
  <button onclick="login()">Entrar</button>
  <button onclick="register()">Registrarse</button>
  <p id="msg"></p>

  <script>
    const HOST = `https://${window.location.hostname}`;
    const PORT = window.location.port ? `:${window.location.port}` : '';

    async function login() {
      const res = await fetch(`${HOST}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.access_token);
        window.location.href = `${HOST}${PORT}/chat.html`;
      } else {
        document.getElementById('msg').textContent = '❌ ' + (data.message || 'Error');
      }
    }

    async function register() {
      const res = await fetch(`${HOST}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          username: document.getElementById('email').value.split('@')[0],
        }),
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.access_token);
        window.location.href = `${HOST}${PORT}/chat.html`;
      } else {
        document.getElementById('msg').textContent = '❌ ' + (data.message || 'Error');
      }
    }
  </script>
</body>
</html>
