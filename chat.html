<!DOCTYPE html>
<html>
<body>
  <h3 id="titulo">Chat</h3>
  <button onclick="getHistory()">Cargar historial</button>
  <ul id="messages"></ul>
  <input id="msg" placeholder="Escribe un mensaje" />
  <button onclick="send()">Enviar</button>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const HOST = `https://${window.location.hostname}`;
    const token = localStorage.getItem('token');
    if (!token) window.location.href = `${HOST}:${window.location.port}/login.html`;

    let currentUser = null;

    async function getMe() {
      const res = await fetch(`${HOST}/api/user/me`, {
        headers: { Authorization: 'Bearer ' + token },
      });
      if (!res.ok) {
        window.location.href = `${HOST}:${window.location.port}/login.html`;
        return;
      }
      currentUser = await res.json();
      document.getElementById('titulo').textContent = `Chat — ${currentUser.username}`;
    }

    const socket = io(HOST, {
      rejectUnauthorized: false,
      secure: true,
    });

    socket.on('connect', () => {
      console.log('Conectado:', socket.id);
      getMe();
    });

    socket.on('newMessage', (data) => {
      const li = document.createElement('li');
      li.textContent = `[${new Date(data.sentAt).toLocaleTimeString()}] autor ${data.authorId}: ${data.content}`;
      document.getElementById('messages').appendChild(li);
    });

    socket.on('messageHistory', (messages) => {
      const list = document.getElementById('messages');
      list.innerHTML = '<li><b>-- Historial --</b></li>';
      messages.forEach(m => {
        const li = document.createElement('li');
        li.textContent = `[${new Date(m.sentAt).toLocaleTimeString()}] ${m.author.username}: ${m.content}`;
        list.appendChild(li);
      });
    });

    function send() {
      if (!currentUser) return;
      const content = document.getElementById('msg').value;
      socket.emit('sendMessage', {
        content,
        channelId: 1,
        authorId: currentUser.id,
      });
      document.getElementById('msg').value = '';
    }

    function getHistory() {
      socket.emit('getMessages', { channelId: 1 });
    }
  </script>
</body>
</html>
